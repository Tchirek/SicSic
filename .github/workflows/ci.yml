name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: embed/package-lock.json

      - name: Install embed dependencies
        working-directory: embed
        run: npm ci

      - name: Build embed package
        working-directory: embed
        run: npm run build

      - name: Audit hardening
        run: npm run audit:hardening -- embed

      - name: Audit public export
        run: npm run audit:public-export -- .
