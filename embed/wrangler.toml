name = "sicsic-comment-ui"
main = "./src/worker.js"
compatibility_date = "2026-06-04"
preview_urls = true

routes = [
  { pattern = "comments.sicnu.pics.tchirek.top", custom_domain = true }
]

[assets]
binding = "ASSETS"
directory = "./dist"
not_found_handling = "single-page-application"
run_worker_first = true

[vars]
COMMENT_API_ORIGIN = "https://api.pics.tchirek.top https://api.docs.tchirek.top https://i.am.tchirek.top"
COMMENT_FRAME_ANCESTORS = "https://sicnu.pics.tchirek.top https://photohost-frontend.pages.dev https://sicnu.docs.tchirek.top https://normaldocs-frontend.pages.dev https://i.am.tchirek.top"
COMMENT_IMG_SRC = "https: data:"
